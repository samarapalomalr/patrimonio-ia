name: patrimonio_ia
description: "Sistema Inteligente para Classificação de Patrimônio Histórico"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  camera: ^0.11.3
  tflite_flutter: ^0.12.1
  image: ^4.2.0

  # Banco de dados local compatível com Linux, Web e Mobile
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.5.10

  path: ^1.9.0
  path_provider: ^2.0.17
  path_provider_linux: ^2.2.0

  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^7.2.0

  url_launcher: ^6.1.12
  shared_preferences: ^2.5.4

flutter:
  uses-material-design: true

  assets:
    - assets/model/model.tflite


















